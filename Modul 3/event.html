        <style>
            *{
                box-sizing: border-box;
            }body{
                font-family: Arial, Helvetica, sans-serif;
            }header{
                background-color:#666;
                padding:30px;
                text-align:center;
                font-size:35px;
                color: white;
            }nav{
                float: left;
                width: 30%;
                height: 550px;
                background: #ccc;
                padding: 20px;
            }nav ul{
                list-style-type:none;
                padding: 0;
            }article{
                float:left;
                padding: 20px;
                width: 70%;
                background-color: #f1f1f1;
                height: 550px;
            }section::after{
                content: "";
                display: table;
                clear: both;
            }footer{

                text-align: center;
                color: white;
            }.gallery {
                display:grid;
                grid-template-columns: repeat(3,1fr);

            }
            .gallery img{
                width:100%;
                height:auto;
                object-fit: cover;
            }
            @media(max-width:600px){
                nav, article {
                    width:100%;
                    height:auto;
                }.gallery{
                    grid-template-columns: 1fr;
                }
            }
        </style>
