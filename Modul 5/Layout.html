<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>layout CSS Grid</title>
        <style>
            .grid-container{
                display: grid;
                grid-template-areas: "header header header" 
                                     "menu main right"
                                     "footer footer footer";
                grid-gap:10px;
                background-color: #2196f3;
                padding:10px;
            }
            .grid-container > div {
                background-color: rgba(255, 255, 255, 0.8);
                text-align: center;
                padding: 20px;
                font-size: 20px;
                border:1px solid #000;
            }
            .header{grid-area: header;}
            .menu{grid-area: menu;}
            .main{grid-area: main;}
            .right{grid-area: right;}
            .footer{grid-area: footer;}
        </style>
    </head>
    <body>
        <div class="grid-container">
            <div class="header">Header</div>
            <div class="menu">Menu</div>
            <div class="main">Main</div>
            <div class="right">Right</div>
            <div class="footer">Footer</div>
        </div>
        <p>dengan menggunakan CSS grid, kita dapat mengatur layout halaman web menjadii teratur seperti header, menu, main, right, dan footer.
            CSS Grid memudahkan pengaturan posisi elemen dalam baris dan kolom sehingga tampilan menjadi lebih rapi dan fleksibel.
        </p>
    </body>
</html>
