<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>From Pendaftaran</title>
    </head>
        <body>
            <h2>Form pendaftaran Mahasiswa</h2>
            <form method="POST" action="proses_pendaftaran.php">
                <label>NIM:</label>
                <input type="text" name="nim"><br><br>
                <label>Nama:</label>
                <input type="text" name="nama"><br><br>
                <label>Email:</label>
                <input type="email" name="email"><br><br>
                <label>Tempat Lahir:</label>
                <input type="text" name="tempat">
                <input type="date" name="ttl"><br><br>
                <label>Alamat:</label>
                <textarea name="alamat" rows="4" cols="40"></textarea><br><br>
                <label>Jenis Kelamin:</label>
                <input type="radio" id="Laki-Laki" name="jenis" value="Laki-Laki"> <label for="Laki-Laki">Laki-Laki</label>
                <input type="radio" id="Perempuan" name="jenis" value="Perempuan"> <label for="Perempuan">Perempuan</label><br><br>
                <input type="submit" name="kirim" value="Kirim"> <br>
            </form>
        </body>
</html>
