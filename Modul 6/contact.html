<!-- Header -->
<header class="container text-center my-5">
  <h1 class="display-4">Contact Us</h1>
  <p class="lead">Silahkan hubungi kami melalui form berikut.</p>
  <p>Nama: Hayyu Adhini Wahida | NIM: 253307039</p>

<!-- Contact Form -->
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow p-4">
        <h4 class="text-center mb-3">Form Kontak</h4>

        <form>
          <div class="mb-3">
            <label for="name" class="form-label">Nama</label>
            <input type="text" class="form-control" id="name" placeholder="Masukkan nama anda" required>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="Masukkan email anda" required>
          </div>

          <div class="mb-3">
            <label for="message" class="form-label">Pesan</label>
            <textarea class="form-control" id="message" rows="4" placeholder="Tulis pesan anda..." required></textarea>
          </div>

          <div class="text-center">
            <button type="submit" class="btn btn-primary px-4">Kirim Pesan</button>
          </div>

        </form>
      </div>

    </div>
  </div>
</div>
