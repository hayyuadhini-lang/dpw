<html>
    <head>
        <style>
            div {
                border: 1px solid black;
                margin: 40px 50px 60px 30px;
                background-color: lightblue;
            }
        </style>
    </head>
    <body>
        <div>
            Elemen ini memiliki margin atas 40px, kanan 50px, 
            bawah 60px, dan kiri 30 px.
        </div>
        <p>pada praktik kali ini kita diajarkan membuat margin. margin dalam css itu adalah ruang kosong diluar element HTML yang berfungsi untuk memberi jarak antar element</p>
    </body>
</html>
