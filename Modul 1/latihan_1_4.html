<!DOCTYPE html>
    <head>
        <title>Halaman HTML Hayyu Comel</title>
        <link rel="icon" type="img/png" hfef="gambar/icon.png" sizes="16x16" />
        <meta charset="UTF-8">
        <meta name="deskription" content="Belajar membuat HTML">
        <meta name="keyword" content="HTML List(daftar)">
        <meta name="author" content="Hayyu comel">  
    </head>
    <body>
        <!--ordered LIST-->
        <ol type="1">
            <li>Jenis Buah :</li>
            <li>Jenis Makanan :</li>
            <li>Gender :</li>
        </ol>

        <!--Unordered LIST-->
        <ul>
            <li>Apel</li>
            <li>Nanas</li>
            <li>Jeruk</li>
            <li>Anggur</li>
        </ul>

        <!--Nested LIST-->
        <ol type="A">
            <li>Jenis Buah :
                <ul>
                    <li>Apel</li>
                    <li>Nanas</li>
                </ul>
            </li>
            <li>Jenis Makanan
                <ol type="1.">
                    <li>Nasi Goreng</li>
                    <li>Nasi Pecel</li>
                    <li>Soto Ayam</li>
                </ol>
            <li>Gender :</li>
                <ol type="a">
                    <li>Laki-Laki</li>
                    <li>Perempuan</li>
                </ol>
            </li>
        </ol>
    </body>
